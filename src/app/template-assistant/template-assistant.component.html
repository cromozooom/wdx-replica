<div class="flex-grow-1 d-flex flex-column overflow-hidden">
  <div>
    <div
      class="border-bottom d-flex gap-2 p-2 justify-content-between align-items-center"
    >
      <!-- Template Selector -->
      <div>
        <div class="d-flex gap-2 align-items-center">
          <label class="form-label mb-0 fw-semibold text-nowrap"
            >Saved Templates:</label
          >
          <select
            class="form-select form-select-sm"
            (change)="loadTemplate($any($event.target).value)"
            [value]="selectedTemplateId() || ''"
          >
            <option value="">-- New Template --</option>
            <option
              *ngFor="let template of savedTemplates()"
              [value]="template.id"
            >
              {{ template.name || "Untitled Template" }} ({{
                template.updatedAt | date: "short"
              }})
            </option>
          </select>
          <button
            *ngIf="selectedTemplateId()"
            class="btn btn-sm btn-outline-danger"
            (click)="deleteTemplate(selectedTemplateId()!)"
            title="Delete selected template"
          >
            Delete
          </button>
        </div>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <div class="form-check form-switch ms-auto">
          <input
            class="form-check-input"
            type="checkbox"
            role="switch"
            id="scrollSyncToggle"
            [checked]="scrollSyncEnabled()"
            (change)="toggleScrollSync()"
          />
          <label class="form-check-label" for="scrollSyncToggle">
            Sync Scroll
          </label>
        </div>
        <div class="btn-group">
          <!-- Open a Bootstrap modal with the JSON that is loaded as a source -->
          <button class="btn btn-sm btn-outline-secondary" (click)="showJson()">
            Show JSON
          </button>
          <button
            class="btn btn-sm btn-outline-secondary"
            (click)="clearTemplate()"
          >
            Clear
          </button>
          <button
            class="btn btn-sm btn-outline-primary"
            (click)="downloadTemplate()"
            title="Download as JSON file"
          >
            Download
          </button>
          <button
            class="btn btn-sm btn-outline-primary"
            (click)="triggerFileUpload()"
            title="Upload JSON file"
          >
            Upload
          </button>
          <button class="btn btn-sm btn-primary" (click)="saveTemplate()">
            Save
          </button>
        </div>
      </div>

      <!-- Hidden file input -->
      <input
        #fileUpload
        type="file"
        accept=".json,application/json"
        style="display: none"
        (change)="handleFileUpload($event)"
      />
    </div>
  </div>
  <div class="flex-grow-1 d-flex overflow-hidden">
    <div class="w-50 d-flex flex-column overflow-hidden">
      <div class="p-2 flex-grow-1 d-flex flex-column overflow-hidden">
        <p class="h6 mb-3 mt-3">
          Use your imagination to create the perfect email template!
        </p>
        <app-template-editor
          #editor
          [content]="currentContent()"
          [availableFields]="availableFields()"
          (contentChange)="onContentChange($event)"
          (pillInserted)="onPillInserted($event)"
          (pillTrigger)="onPillTrigger($event)"
          (pillClicked)="onPillClicked($event)"
        ></app-template-editor>
        <!-- Field Selector -->
        <app-data-field-selector
          [availableFields]="availableFields()"
          [visible]="fieldSelectorVisible()"
          [position]="fieldSelectorPosition()"
          (fieldSelected)="onFieldSelected($event)"
          (closed)="closeFieldSelector()"
        ></app-data-field-selector>
      </div>
    </div>
    <div class="w-50 d-flex flex-column overflow-hidden">
      <app-template-preview
        [markdown]="currentContent()"
        [customerData]="null"
        [fields]="availableFields()"
        (tabChanged)="onTabChange()"
      ></app-template-preview>
    </div>
  </div>
</div>

<!-- JSON Modal Template -->
<ng-template #jsonModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Customer Data JSON</h5>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="modal.dismiss()"
    ></button>
  </div>
  <div class="modal-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <small class="text-muted"
        >Customer data source for template interpolation</small
      >
      <button
        class="btn btn-sm btn-outline-primary"
        (click)="copyJsonToClipboard()"
      >
        <i class="fa-solid fa-copy me-1"></i>
        Copy to Clipboard
      </button>
    </div>
    <pre
      class="bg-light p-3 rounded border"
      style="max-height: 60vh; overflow: auto"
    ><code>{{ customerJsonData() }}</code></pre>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.close()">
      Close
    </button>
  </div>
</ng-template>
