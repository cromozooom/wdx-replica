<div
  class="border rounded bg-white flex-grow-1 d-flex flex-column overflow-hidden"
>
  <!-- Formatting Toolbar -->
  <div
    class="editor-toolbar border-bottom p-2 d-flex gap-2 align-items-center flex-wrap"
  >
    <!-- Heading dropdown -->
    <div ngbDropdown class="btn-group btn-group-sm">
      <button
        type="button"
        class="btn btn-outline-secondary"
        ngbDropdownToggle
        title="Text Format"
      >
        <i class="fa-solid fa-text-height"></i>
      </button>
      <div ngbDropdownMenu>
        <button ngbDropdownItem type="button" (click)="applyParagraph()">
          <i class="fa-solid fa-paragraph me-2"></i>Paragraph
        </button>
        <div class="dropdown-divider"></div>
        <button ngbDropdownItem type="button" (click)="applyHeading(1)">
          <i class="fa-solid fa-heading me-2"></i>Heading 1
        </button>
        <button ngbDropdownItem type="button" (click)="applyHeading(2)">
          <i class="fa-solid fa-heading me-2"></i>Heading 2
        </button>
        <button ngbDropdownItem type="button" (click)="applyHeading(3)">
          <i class="fa-solid fa-heading me-2"></i>Heading 3
        </button>
        <button ngbDropdownItem type="button" (click)="applyHeading(4)">
          <i class="fa-solid fa-heading me-2"></i>Heading 4
        </button>
        <button ngbDropdownItem type="button" (click)="applyHeading(5)">
          <i class="fa-solid fa-heading me-2"></i>Heading 5
        </button>
        <button ngbDropdownItem type="button" (click)="applyHeading(6)">
          <i class="fa-solid fa-heading me-2"></i>Heading 6
        </button>
      </div>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Text formatting -->
    <div class="btn-group btn-group-sm" role="group">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="toggleBold()"
        title="Bold (Ctrl+B)"
      >
        <i class="fa-solid fa-bold"></i>
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="toggleItalic()"
        title="Italic (Ctrl+I)"
      >
        <i class="fa-solid fa-italic"></i>
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="toggleUnderline()"
        title="Underline (Ctrl+U)"
      >
        <i class="fa-solid fa-underline"></i>
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="toggleStrikethrough()"
        title="Strikethrough"
      >
        <i class="fa-solid fa-strikethrough"></i>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Lists & Blocks -->
    <div class="btn-group btn-group-sm" role="group">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="applyBulletList()"
        title="Bullet List"
      >
        <i class="fa-solid fa-list-ul"></i>
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="applyOrderedList()"
        title="Numbered List"
      >
        <i class="fa-solid fa-list-ol"></i>
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="applyBlockquote()"
        title="Blockquote"
      >
        <i class="fa-solid fa-quote-left"></i>
      </button>
    </div>

    <div class="toolbar-divider"></div>

    <!-- Insert elements -->
    <div class="btn-group btn-group-sm" role="group">
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="toggleCode()"
        title="Inline Code"
      >
        <i class="fa-solid fa-code"></i>
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="insertTable()"
        title="Insert Table (custom rows & columns)"
      >
        <i class="fa-solid fa-table"></i>
      </button>
      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="insertImage()"
        title="Insert Image"
      >
        <i class="fa-solid fa-image"></i>
      </button>

      <button
        type="button"
        class="btn btn-outline-secondary"
        (click)="insertHorizontalRule()"
        title="Horizontal Divider"
      >
        <i class="fa-solid fa-ruler-horizontal"></i>
      </button>
    </div>
  </div>

  <!-- Editor -->
  <div class="flex-grow-1 d-flex overflow-hidden">
    <div #syncScrollEditor data-scroll-editor class="overflow-auto w-100">
      <div #editorRef class="milkdown p-3"></div>
    </div>
  </div>
</div>
