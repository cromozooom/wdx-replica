<!-- Menu Item Template (T029, T082) -->
<!-- [disabled]="hasChildrenActive" -->
<button
  class="flex-grow-1 d-flex menu-item border-0 padding-top-0"
  [class.activeL0]="isActive && level === 0"
  [class.active]="isActive"
  [class.visibleDisabled]="isActive && level !== 0"
  [ngClass]="{
    'item-has-children-active': hasChildrenActive,
    'item-has-children': hasChildren && !hasChildrenActive,
    'justify-content-center': isIconsOnlyMode && level === 0,
    'align-items-stretch': !(isIconsOnlyMode && level === 0),
  }"
  [style.padding-left]="getIndentPadding()"
  [style.--left-indent]="getIndentPadding()"
  (click)="onClick($event)"
  [ngbTooltip]="shouldEnableTooltip ? childrenTooltip : null"
  [autoClose]="false"
  triggers="manual"
  #t="ngbTooltip"
  placement="end"
  container="body"
  tooltipClass="children-menu-tooltip"
  (mouseenter)="onItemMouseEnter($event, t)"
  (mouseleave)="onItemMouseLeave(t)"
  [attr.title]="item.label"
>
  <!-- Label with truncation (T082, FR-031) -->
  <!-- Icon -->
  <div class="d-flex align-items-center flex-grow-1 overflow-hidden">
    <div
      class="d-flex flex-grow-1 overflow-hidden align-items-center gap-2 pe-1"
      [class.justify-content-center]="isIconsOnlyMode && level === 0"
    >
      <div
        class="d-flex gap-2 align-items-center oveerflow-hidden max-w-100"
        [class]="
          level === 0
            ? 'px-1 py-3 '
            : isActive
              ? 'ms-1 tree-active ps-2 pe-3 rounded-pill py-1 my-1 xopacity-75'
              : 'ms-1 tree-notActive ps-2 pe-3 rounded-pill py-1 my-1 xopacity-75'
        "
      >
        @if (item.icon && !(hideChildIcons && level > 0)) {
          <!-- [class.py-4]="isLevel0" -->
          <small
            class="d-flex align-items-center justify-content-center"
            style="min-width: 1.2rem"
            [attr.aria-hidden]="true"
            [style.font-size]="level === 0 ? '80%' : '70%'"
            [class.ms-1]="level === 0"
            [class]="isActive || hasChildrenActive ? '' : 'opacity-50'"
          >
            <i [class]="item.icon"></i>
          </small>
        }
        @if (!(isIconsOnlyMode && level === 0)) {
          <span
            class="item-label d-flex align-items-center overflow-hidden"
            [attr.title]="item.label"
          >
            <span
              class="text-truncate"
              [style.font-size]="level === 0 ? '100%' : '80%'"
              >{{ item.label }}</span
            >
          </span>
        }
      </div>
    </div>
  </div>
  <!-- Badge (if metadata.badgeCount exists) -->
  @if (
    item.metadata && item.metadata.badgeCount && item.metadata.badgeCount > 0
  ) {
    <span class="item-badge">
      {{ item.metadata.badgeCount }}
    </span>
  }

  @if (isEditMode || shouldShowChevron) {
    <div class="d-flex align-items-stretch">
      <!-- Edit Mode Actions (T054, FR-016, FR-017) -->
      @if (isEditMode) {
        <div ngbDropdown container="body" class="ms-auto d-flex flex-grow-1">
          <button
            ngbDropdownToggle
            type="button"
            class="btn btn-outline-on-primary border-0 btn-sm rounded-0 my-2"
            (click)="onDropdownToggle($event)"
            title="More actions"
          >
            <i class="fas fa-ellipsis-v"></i>
          </button>
          <div ngbDropdownMenu>
            <button ngbDropdownItem (click)="onEditClick($event)">
              <i class="fas fa-edit me-3"></i>Edit
            </button>
            @if (level < 1) {
              <button ngbDropdownItem (click)="onAddChildClick($event)">
                <i class="fas fa-plus me-3"></i>Add Child
              </button>
            }
            <button ngbDropdownItem (click)="onDeleteClick($event)">
              <i class="fas fa-trash me-3"></i>Delete
            </button>
          </div>
        </div>
      }

      <!-- Expansion Icon (if has children) -->
      @if (shouldShowChevron) {
        <button
          class="me-2 btn btn-outline-on-primary border-0 btn-sm d-flex align-items-center justify-content-center text-decoration-none my-2"
          style="width: 1.3rem"
          [class.rounded-0]="isEditMode"
          [class.expanded]="isExpanded"
          (click)="onToggleExpansion($event)"
          role="button"
          [disabled]="hasChildrenActive"
          [attr.aria-expanded]="isExpanded"
          [attr.aria-label]="isExpanded ? 'Collapse' : 'Expand'"
        >
          <i
            [class]="
              isExpanded ? 'fas fa-chevron-down' : 'fas fa-chevron-right'
            "
          ></i>
        </button>
      }
    </div>
  }
</button>

<!-- Children Tooltip Template for Icons-Only Mode -->
<ng-template #childrenTooltip>
  <div
    class="children-menu-content bg-body px-0 py-2 m-0 d-flex flex-column gap-1 rounded"
    (mouseenter)="onTooltipMouseEnter()"
    (mouseleave)="onTooltipMouseLeave(t)"
  >
    @for (child of item.children; track child.id) {
      <div
        class="rounded-1 menu-child-item mx-2 d-flex align-items-center gap-2 px-3 py-2 pointer justify-content-start"
        [class.active]="activeItemId === child.id"
        (click)="onTooltipChildClick(child.id, t)"
      >
        @if (!hideChildIcons) {
          <i [class]="child.icon || 'fas fa-tag'" class="me-2"></i>
        }
        <span class="child-label text-start">{{ child.label }}</span>
        @if (child.children && child.children.length > 0) {
          <i class="fas fa-chevron-right ms-auto text-muted small"></i>
        }
      </div>
    }
  </div>
</ng-template>
